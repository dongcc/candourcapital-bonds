                labels: allBonds.map(b => b.issuer.length > 15 ? b.issuer.substring(0,12) + '...' : b.issuer),
                datasets: [{
                    label: 'Coupon (%)',
                    data: allBonds.map(b => b.coupon),
                    backgroundColor: allBonds.map(b => b.currency === 'AUD' ? 'rgba(40,167,69,0.8)' : 'rgba(220,53,69,0.8)'),
                    borderColor: allBonds.map(b => b.currency === 'AUD' ? 'rgba(40,167,69,1)' : 'rgba(220,53,69,1)'),
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, title: { display: true, text: 'Coupon %' } }, x: { ticks: { maxRotation: 45, minRotation: 45 } } }
            }
        });

        // Chart 2: Currency distribution
        const currencyCtx = document.getElementById('currencyChart').getContext('2d');
        new Chart(currencyCtx, {
            type: 'doughnut',
            data: {
                labels: ['AUD', 'USD'],
                datasets: [{
                    data: [audBonds.length, usdBonds.length],
                    backgroundColor: ['rgba(40,167,69,0.8)', 'rgba(220,53,69,0.8)'],
                    borderColor: ['rgba(40,167,69,1)', 'rgba(220,53,69,1)'],
                    borderWidth: 2
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        // Chart 3: Coupon distribution
        const distCtx = document.getElementById('distributionChart').getContext('2d');
        const bins = [0,5,6,7,8,9,100].map((v,i) => ({min:v,max:[5,6,7,8,9,100][i]||100, label:f'{v}-{[5,6,7,8,9,100][i]||"∞"}%'}));
        const binData = bins.map(bin => allBonds.filter(b => b.coupon >= bin.min && b.coupon < bin.max).length);
        new Chart(distCtx, {
            type: 'pie',
            data: {
                labels: bins.map(b => b.label),
                datasets: [{ data: binData, backgroundColor: ['#28a745','#20c997','#ffc107','#fd7e14','#e74c3c','#6f42c1'], borderWidth: 2 }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        // Chart 4: Maturity timeline
        const maturityCtx = document.getElementById('maturityChart').getContext('2d');
        function parseMaturity(str) {
            if (str === 'Perpetual') return null;
            const parts = str.split('-');
            if (parts.length !== 3) return null;
            const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
            return new Date(parseInt(parts[2]), months[parts[1]], parseInt(parts[0]));
        }
        const sortedBonds = allBonds.filter(b => parseMaturity(b.maturity_date)).sort((a,b) => parseMaturity(a.maturity_date) - parseMaturity(b.maturity_date));
        new Chart(maturityCtx, {
            type: 'line',
            data: {
                labels: sortedBonds.map(b => b.issuer.length > 12 ? b.issuer.substring(0,10) + '...' : b.issuer),
                datasets: [{
                    label: 'Maturity Year',
                    data: sortedBonds.map(b => parseMaturity(b.maturity_date).getFullYear()),
                    borderColor: 'rgba(102,126,234,1)',
                    backgroundColor: 'rgba(102,126,234,0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 5,
                    pointBackgroundColor: sortedBonds.map(b => b.currency === 'AUD' ? '#28a745' : '#dc3545')
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { title: { display: true, text: 'Year' } } }
            }
        });
    </script>
</body>
</html>
